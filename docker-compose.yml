version: '3.8'

services:
  zookeeper:
    image: confluentinc/cp-zookeeper:7.4.0
    container_name: zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "2181:2181"
    networks:
      - pipeline_net

  kafka:
    image: confluentinc/cp-kafka:7.4.0
    container_name: kafka
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    networks:
      - pipeline_net

  kafka-init:
    image: confluentinc/cp-kafka:7.4.0
    container_name: kafka-init
    depends_on:
      - kafka
    entrypoint: ["/bin/sh", "-c"]
    command: >
      "
      echo 'Esperando Kafka...'
      sleep 15
      kafka-topics --bootstrap-server kafka:29092 --create --if-not-exists --topic temperatura --partitions 3 --replication-factor 1
      kafka-topics --bootstrap-server kafka:29092 --create --if-not-exists --topic presion --partitions 3 --replication-factor 1
      kafka-topics --bootstrap-server kafka:29092 --create --if-not-exists --topic vibracion --partitions 3 --replication-factor 1
      kafka-topics --bootstrap-server kafka:29092 --create --if-not-exists --topic alertas --partitions 1 --replication-factor 1
      echo 'Topics creados exitosamente!'
      kafka-topics --bootstrap-server kafka:29092 --list
      "
    networks:
      - pipeline_net

  producer-temperatura:
    build:
      context: .
      dockerfile: Dockerfile.producer
    container_name: producer-temperatura
    depends_on:
      - kafka-init
    environment:
      KAFKA_BROKER: kafka:29092
      SENSOR_TYPE: temperatura
    command: python producers/producer_temperatura.py
    networks:
      - pipeline_net

  producer-presion:
    build:
      context: .
      dockerfile: Dockerfile.producer
    container_name: producer-presion
    depends_on:
      - kafka-init
    environment:
      KAFKA_BROKER: kafka:29092
      SENSOR_TYPE: presion
    command: python producers/producer_presion.py
    networks:
      - pipeline_net

  producer-vibracion:
    build:
      context: .
      dockerfile: Dockerfile.producer
    container_name: producer-vibracion
    depends_on:
      - kafka-init
    environment:
      KAFKA_BROKER: kafka:29092
      SENSOR_TYPE: vibracion
    command: python producers/producer_vibracion.py
    networks:
      - pipeline_net

  spark-processor:
    build:
      context: .
      dockerfile: Dockerfile.spark
    container_name: spark-processor
    depends_on:
      - kafka-init
    environment:
      KAFKA_BROKER: kafka:29092
    volumes:
      - ./output:/app/output
    command: spark-submit --packages org.apache.spark:spark-sql-kafka-0-10_2.12:3.4.0 processor/spark_processor.py
    networks:
      - pipeline_net

  alert-monitor:
    build:
      context: .
      dockerfile: Dockerfile.producer
    container_name: alert-monitor
    depends_on:
      - kafka-init
    environment:
      KAFKA_BROKER: kafka:29092
    volumes:
      - ./output:/app/output
    command: python alerts/alert_consumer.py
    networks:
      - pipeline_net

networks:
  pipeline_net:
    driver: bridge

volumes:
  output:
